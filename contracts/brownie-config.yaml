project_structure:
    build: build
    contracts: contracts
    interfaces: interfaces
    reports: reports
    scripts: scripts
    tests: tests

dependencies:
  - OpenZeppelin/openzeppelin-contracts@5.5.0

networks:
    default: anvil
    development:
        gas_limit: max
        gas_buffer: 1
        gas_price: 0
        max_fee: null
        priority_fee: null
        reverting_tx_gas_limit: max
        default_contract_owner: true
        cmd_settings: null
    live:
        gas_limit: auto
        gas_buffer: 1.1
        gas_price: null
        max_fee: null
        priority_fee: auto
        reverting_tx_gas_limit: false
        default_contract_owner: false

compiler:
    evm_version: cancun
    solc:
        version: 0.8.26
        optimizer:
            enabled: true
            runs: 200
        remappings: 
          - "@openzeppelin=OpenZeppelin/openzeppelin-contracts@5.5.0"
    vyper:
        version: null

console:
    show_colors: true
    color_style: monokai
    auto_suggest: true
    completions: true
    editing_mode: emacs

reports:
    exclude_paths: null
    exclude_contracts: null
    only_include_project: true

hypothesis:
    deadline: null
    max_examples: 50
    report_multiple_bugs: False
    stateful_step_count: 10
    phases:
        explicit: true
        reuse: true
        generate: true
        target: true
        shrink: true

autofetch_sources: false
dev_deployment_artifacts: false
eager_caching: true